version: '3.8'

services:
  postgres:
    container_name: shortener-url
    image: postgres:16-alpine
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: shortener-url-db
    networks:
      - shortener-network
    volumes:
      - shortener-url-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: shortener-url-app
    depends_on:
      - postgres
    ports:
      - 8080:8080
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - shortener-network


networks:
    shortener-network:
      driver: bridge

volumes:
  shortener-url-data:

