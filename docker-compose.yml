version: '3.8'

services:
  postgres:
    container_name: shortener-url
    image: postgres:16-alpine
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: shortener-url-db
    networks:
      - shortener-network
    volumes:
      - shortener-url-data:/var/lib/postgresql/data


networks:
    shortener-network:
      driver: bridge

volumes:
  shortener-url-data: